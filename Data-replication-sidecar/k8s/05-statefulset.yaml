apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: stat
spec:
  serviceName: mysql-headless
  replicas: 3
  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      terminationGracePeriodSeconds: 30

      initContainers:

      # 🔹 INIT MYSQL CONFIG
      - name: init-mysql
        image: mysql:5.7
        command: ["bash", "-c"]
        args:
        - |
          set -ex
          [[ $HOSTNAME =~ -([0-9]+)$ ]] || exit 1
          ordinal=${BASH_REMATCH[1]}

          echo "[mysqld]" > /mnt/conf.d/server-id.cnf
          echo "server-id=$((100 + $ordinal))" >> /mnt/conf.d/server-id.cnf

          if [[ $ordinal -eq 0 ]]; then
            echo "log-bin=mysql-bin" >> /mnt/conf.d/server-id.cnf
          else
            echo "read_only=ON" >> /mnt/conf.d/server-id.cnf
          fi

        volumeMounts:
        - name: conf
          mountPath: /mnt/conf.d

      # 🔹 CLONE MYSQL (FINAL FIXED VERSION)
      - name: clone-mysql
        image: gcr.io/google-samples/xtrabackup:1.0
        command: ["bash", "-c"]
        args:
        - |
          set -ex

          [[ -d /var/lib/mysql/mysql ]] && exit 0

          [[ `hostname` =~ -([0-9]+)$ ]] || exit 1
          ordinal=${BASH_REMATCH[1]}
          [[ $ordinal -eq 0 ]] && exit 0

          echo "Waiting for backup stream from mysql-$((ordinal-1))..."

          # 🔥 RETRY LOOP (IMPORTANT FIX)
          while true; do
            ncat --recv-only mysql-$(($ordinal-1)).mysql-headless.stat.svc.cluster.local 3307 \
              | xbstream -x -C /var/lib/mysql && break

            echo "Retrying clone..."
            sleep 3
          done

          echo "Preparing backup..."
          xtrabackup --prepare --target-dir=/var/lib/mysql

        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        - name: conf
          mountPath: /etc/mysql/conf.d

      containers:

      # 🟢 MYSQL
      - name: mysql
        image: mysql:5.7
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-root-password

        ports:
        - containerPort: 3306

        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        - name: conf
          mountPath: /etc/mysql/conf.d

      # 🔵 XTRABACKUP SIDECAR
      - name: xtrabackup
        image: gcr.io/google-samples/xtrabackup:1.0
        command: ["bash", "-c"]
        args:
        - |
          set -ex
          cd /var/lib/mysql

          if [[ -f xtrabackup_slave_info && "x$(<xtrabackup_slave_info)" != "x" ]]; then
            cat xtrabackup_slave_info | sed -E 's/;$//g' > change_master_to.sql.in
            rm -f xtrabackup_slave_info xtrabackup_binlog_info
          elif [[ -f xtrabackup_binlog_info ]]; then
            [[ `cat xtrabackup_binlog_info` =~ ^(.*?)[[:space:]]+(.*?)$ ]] || exit 1
            rm -f xtrabackup_binlog_info xtrabackup_slave_info
            echo "CHANGE MASTER TO MASTER_LOG_FILE='${BASH_REMATCH[1]}', MASTER_LOG_POS=${BASH_REMATCH[2]}" > change_master_to.sql.in
          fi

          if [[ -f change_master_to.sql.in ]]; then
            until mysql -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} -e "SELECT 1"; do sleep 1; done

            mysql -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} \
              -e "$(<change_master_to.sql.in), \
              MASTER_HOST='mysql-0.mysql-headless.stat.svc.cluster.local', \
              MASTER_USER='repl', \
              MASTER_PASSWORD='ReplPass!123', \
              MASTER_CONNECT_RETRY=10; \
              START SLAVE;"

            mv change_master_to.sql.in change_master_to.sql.orig
          fi

          echo "Starting backup server..."

          exec ncat --listen --keep-open --send-only --max-conns=1 3307 -c \
            "xtrabackup --backup --slave-info --stream=xbstream --host=127.0.0.1 --user=root --password=${MYSQL_ROOT_PASSWORD}"

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-root-password

        ports:
        - containerPort: 3307

        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        - name: conf
          mountPath: /etc/mysql/conf.d

      volumes:
      - name: conf
        emptyDir: {}

  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
