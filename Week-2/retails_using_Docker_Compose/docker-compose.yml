services:
  mysql:
    image: mysql:8
    container_name: mysql-conatiner
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: retailsdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: password
    networks:
      - retails_network

  app:
    build: .
    container_name: retails_container
    ports:
      - "8080:8080"
    networks:
      - retails_network
    depends_on:
      - mysql

networks:
  retails_network:
    driver: bridge