apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysqldeployment
spec: 
  replicas: 1
  selector:
    matchLabels:
      app: mysqldb
  template:
    metadata:
      labels:
        app: mysqldb
    spec:
      containers:
      - name: retailsdbcon
        image: mysql:8
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "password"
        - name: MYSQL_DATABASE
          value: "retailsdb"
        - name: MYSQL_USER
          value: "appuser"
        - name: MYSQL_PASSWORD
          value: "password"
        ports:
        - containerPort: 3306

